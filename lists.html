<body>
    <h1>Types of Lists</h1>
    
    <h3>Unordered List (Shopping List)</h3>
    <ul>
        <li>Apples</li>
        <li>Milk</li>
        <li>Bread</li>
    </ul>

    <h3>Ordered List (Steps to Code)</h3>

        <li>Open a text editor.</li>
        <li>Write your HTML code.</li>
        <li>Save the file with a .html extension.</li>
        <li>Open in a browser.</li>
    </ol>
